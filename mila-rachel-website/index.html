<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="מילה רחל"/>
<meta name="theme-color" content="#F9A8C9"/>
<title>מילה רחל 🌸</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#FFF8F5;font-family:'Segoe UI','Arial Hebrew',Arial,sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;}
button{font-family:inherit;cursor:pointer;border:none;}
input,textarea{font-family:inherit;outline:none;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.82}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:2px solid #F9A8C9;display:flex;justify-content:space-around;padding:8px 0 16px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.07);}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;opacity:.4;transition:all .2s;padding:0 8px;}
.nav-btn.active{opacity:1;transform:scale(1.1);}
.nav-btn span:first-child{font-size:22px;}
.nav-btn span:last-child{font-size:10px;font-weight:700;color:#3D2B4F;}

/* HEADER */
#header{background:linear-gradient(135deg,#F9A8C9,#C5B4E8);padding:22px 20px 16px;border-radius:0 0 32px 32px;text-align:center;position:relative;box-shadow:0 4px 20px rgba(61,43,79,.1);}
#header h1{font-size:24px;font-weight:900;color:#fff;margin-top:4px;}
#header .status{font-size:12px;color:rgba(255,255,255,.85);margin-top:3px;min-height:18px;}
#sync-btn{position:absolute;left:14px;top:18px;background:rgba(255,255,255,.25);border:none;border-radius:10px;padding:6px 10px;font-size:16px;}

/* ALERT */
#alert-banner{margin:12px 16px 0;border-radius:18px;padding:14px 18px;display:none;align-items:center;gap:12px;animation:pulse 2s infinite;}
#alert-banner.show{display:flex;}
#alert-banner.warn{background:#FFB347;box-shadow:0 4px 20px rgba(255,179,71,.4);}
#alert-banner.urgent{background:#FF6B6B;box-shadow:0 4px 20px rgba(255,107,107,.4);}
#alert-banner .alert-icon{font-size:32px;}
#alert-banner .alert-text{flex:1;}
#alert-banner .alert-title{font-weight:900;color:#fff;font-size:15px;}
#alert-banner .alert-sub{font-size:12px;color:rgba(255,255,255,.85);margin-top:2px;}

/* FEEDING TIMER */
#feeding-timer{margin:12px 16px 0;background:#fff;border-radius:20px;padding:14px 18px;display:none;flex-direction:column;gap:10px;box-shadow:0 2px 16px rgba(249,168,201,.25);border:2px solid #F9A8C9;}
#feeding-timer.show{display:flex;}
#feeding-timer .timer-top{display:flex;align-items:center;gap:14px;}
#feeding-timer .timer-clock{font-size:36px;}
#feeding-timer .timer-info{flex:1;}
#feeding-timer .timer-label{font-size:12px;color:#9B8AAD;font-weight:600;}
#feeding-timer .timer-value{font-size:26px;font-weight:900;color:#3D2B4F;line-height:1.1;font-variant-numeric:tabular-nums;}
#feeding-timer .timer-bar-wrap{width:42px;display:flex;flex-direction:column;align-items:center;gap:4px;}
#feeding-timer .timer-bar-bg{width:8px;height:60px;background:#f0e8ff;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;}
#feeding-timer .timer-bar-fill{width:100%;background:linear-gradient(to top,#F9A8C9,#C5B4E8);border-radius:8px;transition:height .5s;}
#feeding-timer .timer-pct{font-size:10px;font-weight:700;color:#9B8AAD;}
#feeding-timer .timer-next-box{background:#FFF8F5;border-radius:14px;padding:10px 14px;border:1.5px solid #F9A8C9;text-align:center;}
#feeding-timer .timer-next-label{font-size:11px;color:#9B8AAD;font-weight:600;margin-bottom:2px;}
#feeding-timer .timer-next-time{font-size:30px;font-weight:900;color:#3D2B4F;letter-spacing:1px;}
#feeding-timer .timer-next-sub{font-size:12px;color:#9B8AAD;margin-top:2px;font-weight:600;}
#feeding-timer.overdue .timer-next-box{background:#fff0f0;border-color:#FF6B6B;}
#feeding-timer.overdue .timer-next-time{color:#FF6B6B;}

/* PAGES */
.page{padding:16px 16px 20px;display:none;}
.page.active{display:block;}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-card{border-radius:14px;padding:10px 4px;text-align:center;}
.stat-card .emoji{font-size:18px;}
.stat-card .val{font-size:18px;font-weight:900;color:#3D2B4F;}
.stat-card .lbl{font-size:10px;color:#9B8AAD;font-weight:600;}

/* SECTION */
.section{margin-bottom:22px;}
.section-title{font-size:15px;font-weight:900;color:#3D2B4F;margin-bottom:12px;}

/* ENTRY ROW */
.entry-row{border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;border:1.5px solid;}
.entry-row .entry-emoji{font-size:24px;}
.entry-row .entry-info{flex:1;}
.entry-row .entry-label{font-weight:800;color:#3D2B4F;font-size:14px;}
.entry-row .entry-sub{font-size:13px;color:#9B8AAD;font-weight:600;}
.entry-row .entry-by{font-size:11px;color:#C5B4E8;font-weight:700;margin-top:2px;}
.entry-row .entry-time{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.entry-row .entry-time .t{font-size:13px;font-weight:800;color:#3D2B4F;}
.entry-row .entry-time .ago{font-size:11px;color:#9B8AAD;}
.entry-row .entry-time .edit{font-size:11px;color:#C5B4E8;font-weight:700;}
.entry-row.clickable{cursor:pointer;}

/* ACTION BTNS */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.action-btn{border-radius:18px;padding:20px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;border:2px solid;}
.action-btn .a-emoji{font-size:36px;}
.action-btn .a-label{font-size:16px;font-weight:800;color:#3D2B4F;}

/* VIT BTNS */
.vit-row{display:flex;gap:10px;}
.vit-btn{flex:1;border-radius:16px;padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;border:2px solid;transition:all .2s;position:relative;}
.vit-btn .v-emoji{font-size:24px;}
.vit-btn .v-label{font-size:11px;font-weight:800;color:#3D2B4F;}
.vit-btn .v-status{font-size:10px;font-weight:700;color:#9B8AAD;}
.vit-btn.done .v-status{color:#3D2B4F;}
.vit-btn .v-count{position:absolute;top:4px;left:4px;background:#FF6B6B;color:#fff;border-radius:10px;font-size:9px;font-weight:900;padding:1px 5px;}

/* SHEET / MODAL */
#overlay{position:fixed;inset:0;background:rgba(61,43,79,.38);z-index:200;display:none;align-items:flex-end;justify-content:center;}
#overlay.show{display:flex;}
#sheet{background:#fff;border-radius:28px 28px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;box-shadow:0 -8px 40px rgba(0,0,0,.13);max-height:92vh;overflow-y:auto;animation:slideUp .25s ease;}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.sheet-title{font-size:19px;font-weight:900;color:#3D2B4F;}
.sheet-close{background:#f0eaf7;border:none;border-radius:10px;width:34px;height:34px;font-size:17px;}

/* QUICK PICKER */
.quick-grid{display:grid;gap:10px;margin-bottom:14px;}
.quick-grid.cols3{grid-template-columns:repeat(3,1fr);}
.quick-grid.cols2{grid-template-columns:1fr 1fr;}
.quick-btn{border-radius:14px;padding:14px 6px;font-weight:900;font-size:17px;color:#3D2B4F;border:2px solid;display:flex;flex-direction:column;align-items:center;}
.quick-btn .unit{font-size:11px;font-weight:600;color:#9B8AAD;margin-top:2px;}
.big-btn{border-radius:18px;padding:22px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;border:2px solid;}
.big-btn .b-emoji{font-size:34px;}
.big-btn .b-label{font-size:16px;font-weight:800;color:#3D2B4F;}

/* INPUTS */
.lbl{font-size:13px;font-weight:700;color:#9B8AAD;margin-bottom:8px;}
.inp{width:100%;padding:12px 14px;border-radius:12px;border:2px solid #C5B4E8;font-size:15px;color:#3D2B4F;background:#FFF8F5;}
textarea.inp{resize:vertical;}
.inp-row{display:flex;gap:10px;}

/* SAVE BTN */
.save-btn{width:100%;margin-top:18px;padding:14px;border-radius:16px;background:linear-gradient(135deg,#F9A8C9,#C5B4E8);border:none;font-size:16px;font-weight:900;color:#fff;}
.del-btn{width:100%;margin-top:10px;padding:12px;border-radius:14px;background:#fff0f0;border:1.5px solid #FF6B6B;font-size:14px;font-weight:700;color:#FF6B6B;}
.confirm-del{margin-top:10px;background:#fff0f0;border-radius:14px;padding:14px;border:1.5px solid #FF6B6B;}
.confirm-del .q{text-align:center;font-weight:700;color:#FF6B6B;margin-bottom:12px;font-size:14px;}
.confirm-row{display:flex;gap:10px;}
.yes-btn{flex:1;padding:11px;border-radius:12px;background:#FF6B6B;border:none;font-size:14px;font-weight:900;color:#fff;}
.no-btn{flex:1;padding:11px;border-radius:12px;background:#FFF8F5;border:1.5px solid #9B8AAD;font-size:14px;font-weight:700;color:#9B8AAD;}

/* WHO BTNS */
.who-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.who-btn{background:rgba(197,180,232,.27);border:2.5px solid #C5B4E8;border-radius:18px;padding:22px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.who-btn .who-emoji{font-size:34px;}
.who-btn .who-name{font-size:18px;font-weight:900;color:#3D2B4F;}
.other-btn{width:100%;padding:14px;border-radius:16px;background:#FFF8F5;border:2px solid #9B8AAD;font-size:16px;font-weight:800;color:#9B8AAD;}
.custom-name-box{background:rgba(197,180,232,.13);border:2px solid #C5B4E8;border-radius:16px;padding:16px;}

/* FILTER CHIPS */
.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.chip{padding:7px 12px;border-radius:20px;border:2px solid #C5B4E8;background:rgba(197,180,232,.13);font-weight:700;font-size:12px;color:#3D2B4F;}
.chip.active{background:#C5B4E8;}

/* MEDICAL */
.med-tabs{display:flex;gap:10px;margin-bottom:20px;}
.med-tab{flex:1;padding:10px;border-radius:14px;border:2px solid;font-weight:800;font-size:14px;color:#3D2B4F;}
.record-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(61,43,79,.1);}
.record-card .rc-title{font-weight:900;color:#3D2B4F;font-size:15px;}
.record-card .rc-sub{font-size:12px;color:#9B8AAD;margin-top:2px;}
.record-actions{display:flex;gap:6px;}
.edit-sm{background:rgba(197,180,232,.2);border:1px solid #C5B4E8;border-radius:8px;padding:4px 8px;font-size:12px;}
.del-sm{background:#fff0f0;border:1px solid #FF6B6B;border-radius:8px;padding:4px 8px;font-size:12px;color:#FF6B6B;}
.med-type-row{display:flex;gap:8px;margin-bottom:16px;}
.med-type-btn{flex:1;padding:10px 4px;border-radius:12px;border:2px solid #D4A8F9;background:rgba(212,168,249,.13);font-weight:800;font-size:12px;color:#3D2B4F;display:flex;flex-direction:column;align-items:center;gap:3px;}
.med-type-btn.active{background:#D4A8F9;}
.freq-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.freq-btn{padding:7px 12px;border-radius:10px;border:1.5px solid #C5B4E8;background:rgba(197,180,232,.13);font-size:12px;font-weight:700;color:#3D2B4F;}
.freq-btn.active{background:#C5B4E8;}

/* TOAST */
#toast{position:fixed;bottom:95px;left:50%;transform:translateX(-50%);background:#3D2B4F;color:#fff;border-radius:20px;padding:10px 26px;font-size:15px;font-weight:700;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);display:none;}
#toast.show{display:block;}

/* LOADER */
#loader{position:fixed;inset:0;background:linear-gradient(135deg,#F9A8C9,#C5B4E8,#9EDFCC);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;}
#loader .spin{width:36px;height:36px;border:4px solid rgba(255,255,255,.3);border-top:4px solid #fff;border-radius:50%;animation:spin .9s linear infinite;margin-top:20px;}

/* VIT HISTORY */
.vit-history-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:12px 16px;margin-bottom:8px;box-shadow:0 2px 10px rgba(61,43,79,.1);}
.vit-icons{display:flex;gap:12px;align-items:center;}
.vit-icons .vi{display:flex;flex-direction:column;align-items:center;}
.vit-icons .vi span{font-size:18px;}
.vit-icons .vi small{font-size:9px;font-weight:700;color:#9B8AAD;}

/* PERFORMER EDIT ROW */
.performer-btns{display:flex;gap:8px;margin-bottom:8px;}
.perf-btn{flex:1;padding:10px 6px;border-radius:12px;border:2px solid #C5B4E8;background:rgba(197,180,232,.13);font-weight:800;font-size:14px;color:#3D2B4F;}
.perf-btn.active{background:#C5B4E8;}

.empty{text-align:center;color:#9B8AAD;padding:30px 0;font-size:15px;}
.add-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.add-header .title{font-size:15px;font-weight:900;color:#3D2B4F;}
.add-header .add-btn{border:none;border-radius:12px;padding:8px 16px;font-size:14px;font-weight:800;color:#fff;}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div style="font-size:72px">🌸</div>
  <div style="font-size:28px;font-weight:900;color:#fff;margin-top:12px">מילה רחל</div>
  <div style="font-size:14px;color:rgba(255,255,255,.8);margin-top:6px">טוען נתונים...</div>
  <div class="spin"></div>
</div>

<!-- HEADER -->
<div id="header">
  <div style="font-size:32px">🌸</div>
  <h1>מילה רחל</h1>
  <div class="status" id="save-status">👨‍👩‍👧 יומן משפחתי</div>
  <button id="sync-btn" onclick="syncNow()">🔄</button>
</div>

<!-- ALERT -->
<div id="alert-banner">
  <div class="alert-icon">🍼</div>
  <div class="alert-text">
    <div class="alert-title" id="alert-title">🔔 זמן האכלה!</div>
    <div class="alert-sub" id="alert-sub"></div>
  </div>
</div>

<!-- FEEDING TIMER -->
<div id="feeding-timer">
  <div class="timer-top">
    <div class="timer-clock">⏱️</div>
    <div class="timer-info">
      <div class="timer-label">מאז האכלה אחרונה</div>
      <div class="timer-value" id="timer-value">--:--</div>
    </div>
    <div class="timer-bar-wrap">
      <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-bar" style="height:0%"></div></div>
      <div class="timer-pct" id="timer-pct">0%</div>
    </div>
  </div>
  <div class="timer-next-box">
    <div class="timer-next-label">🍼 האכלה הבאה בשעה</div>
    <div class="timer-next-time" id="timer-next-time">--:--</div>
    <div class="timer-next-sub" id="timer-next-sub"></div>
  </div>
</div>

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="stats" id="stats-row"></div>
  <div class="section">
    <div class="section-title">אחרון שנרשם 🕐</div>
    <div id="last-feeding-row"></div>
    <div id="last-diaper-row"></div>
  </div>
  <div class="section">
    <div class="section-title">הוספה מהירה ✏️</div>
    <div class="action-grid">
      <button class="action-btn" style="background:rgba(249,168,201,.2);border-color:#F9A8C9" onclick="openSheet('feeding-type')">
        <span class="a-emoji">🍼</span><span class="a-label">האכלה</span>
      </button>
      <button class="action-btn" style="background:rgba(158,223,204,.2);border-color:#9EDFCC" onclick="openSheet('diaper')">
        <span class="a-emoji">👶</span><span class="a-label">חיתול</span>
      </button>
    </div>
  </div>
  <div class="section">
    <div class="section-title">ויטמינים היום 💊</div>
    <div class="vit-row" id="home-vit-row"></div>
  </div>
  <div class="section" id="meds-quick-section" style="display:none">
    <div class="section-title">תרופות קבועות 💊</div>
    <div id="meds-quick-list"></div>
  </div>
</div>

<!-- HISTORY PAGE -->
<div id="page-history" class="page">
  <div class="filter-row" id="history-filters"></div>
  <div id="history-list"></div>
</div>

<!-- VITAMINS PAGE -->
<div id="page-vitamins" class="page">
  <div class="section">
    <div class="section-title">היום</div>
    <div class="vit-row" id="vit-today-row"></div>
    <div id="simecol-picker" style="display:none;margin-top:12px;background:rgba(168,216,249,.13);border:2px solid #A8D8F9;border-radius:18px;padding:16px 14px;">
      <div class="lbl">כמות סימיקול (ניתן מספר פעמים):</div>
      <div class="quick-grid cols3" style="margin-top:8px">
        <button class="quick-btn" style="background:rgba(168,216,249,.27);border-color:#A8D8F9" onclick="giveSimecol(0.2)">0.2<span class="unit">מ״ל</span></button>
        <button class="quick-btn" style="background:rgba(168,216,249,.27);border-color:#A8D8F9" onclick="giveSimecol(0.3)">0.3<span class="unit">מ״ל</span></button>
        <button class="quick-btn" style="background:rgba(168,216,249,.27);border-color:#A8D8F9" onclick="giveSimecol(0.4)">0.4<span class="unit">מ״ל</span></button>
      </div>
      <div class="inp-row" style="margin-top:8px">
        <input class="inp" type="number" step="0.1" id="simecol-custom" placeholder="כמות אחרת..."/>
        <button style="background:#A8D8F9;border:none;border-radius:12px;padding:11px 16px;font-size:17px;font-weight:900" onclick="giveSimecol(parseFloat(document.getElementById('simecol-custom').value))">✅</button>
      </div>
    </div>
    <div id="simecol-count-label" style="font-size:12px;color:#A8D8F9;text-align:center;margin-top:6px;font-weight:700;display:none"></div>
  </div>
  <div class="section">
    <div class="section-title">14 ימים אחרונים</div>
    <div id="vit-history"></div>
  </div>
</div>

<!-- MEDICAL PAGE -->
<div id="page-medical" class="page">
  <div class="med-tabs">
    <button class="med-tab active" id="med-tab-records" style="border-color:#A8F0E8;background:rgba(168,240,232,.2)" onclick="switchMedTab('records')">🩺 בדיקות</button>
    <button class="med-tab" id="med-tab-meds" style="border-color:#D4A8F9;background:rgba(212,168,249,.07)" onclick="switchMedTab('meds')">💊 תרופות</button>
  </div>
  <div id="medical-records-view">
    <div class="add-header">
      <div class="title">יומן בדיקות 🩺</div>
      <button class="add-btn" style="background:linear-gradient(135deg,#A8F0E8,#9EDFCC);color:#3D2B4F" onclick="openSheet('record-form',null)">+ הוסף</button>
    </div>
    <div id="future-records"></div>
    <div id="past-records"></div>
  </div>
  <div id="medical-meds-view" style="display:none">
    <div class="add-header">
      <div class="title">תרופות ומשחות 🧴</div>
      <button class="add-btn" style="background:linear-gradient(135deg,#D4A8F9,#C5B4E8)" onclick="openSheet('med-form',null)">+ הוסף</button>
    </div>
    <div id="meds-list"></div>
  </div>
</div>

<!-- SHEET / MODAL -->
<div id="overlay" onclick="overlayClick(event)">
  <div id="sheet"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- NAV -->
<nav id="nav">
  <button class="nav-btn active" id="nav-home" onclick="goTab('home')"><span>🏠</span><span>בית</span></button>
  <button class="nav-btn" id="nav-history" onclick="goTab('history')"><span>📋</span><span>היסטוריה</span></button>
  <button class="nav-btn" id="nav-vitamins" onclick="goTab('vitamins')"><span>💊</span><span>ויטמינים</span></button>
  <button class="nav-btn" id="nav-medical" onclick="goTab('medical')"><span>🏥</span><span>רפואי</span></button>
</nav>

<!-- FIREBASE -->

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let DATA = {entries:[],vitamins:{},medicalRecords:[],medicines:[]};
let pendingEntry = null;
let currentEditEntry = null;
let currentTab = "home";
let histFilter = "all";
let medTab = "records";
let saveTimer = null;
let alertTimer = null;
let showSimecol = false;

const ALERT_HOURS = 4;
const NEXT_FEEDING_HOURS = 3;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function nowIso(){return new Date().toISOString();}
function todayStr(){return new Date().toISOString().slice(0,10);}
function timeAgo(iso){
  const d=Math.floor((Date.now()-new Date(iso))/60000);
  if(d<1)return"עכשיו";if(d<60)return`לפני ${d} דק'`;
  const h=Math.floor(d/60),m=d%60;return m===0?`לפני ${h} ש'`:`לפני ${h} ש' ${m} דק'`;
}
function fmtTime(iso){return new Date(iso).toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});}
function fmtDate(ds){
  if(ds===todayStr())return"היום";
  const y=new Date();y.setDate(y.getDate()-1);
  if(ds===y.toISOString().slice(0,10))return"אתמול";
  return new Date(ds+"T12:00:00").toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"});
}
function fmtFullDate(ds){return new Date(ds+"T12:00:00").toLocaleDateString("he-IL",{day:"numeric",month:"long",year:"numeric"});}
function isFuture(ds){return ds>todayStr();}

function entryEmoji(e){
  if(e.category==="vitamin")return e.key==="simecol"?"🔵":e.key==="vitD"?"☀️":"🩸";
  if(e.category==="medicine")return e.medType==="משחה"?"🧴":e.medType==="טיפות"?"💧":"💊";
  if(e.category==="feeding")return e.type==="breast"?"🤱":e.type==="pump"?"🫙":"🍼";
  return e.type==="wet"?"💧":e.type==="dirty"?"💩":e.type==="both"?"💧💩":"✨";
}
function entryLabel(e){
  if(e.category==="vitamin")return e.key==="simecol"?"סימיקול":e.key==="vitD"?"ויטמין D":"ברזל";
  if(e.category==="medicine")return e.name||"תרופה";
  if(e.category==="feeding")return e.type==="breast"?"האכלת שד":e.type==="pump"?"שאיבה 🫙":"האכלת בקבוק";
  return "חיתול";
}
function entrySub(e){
  if(e.category==="vitamin")return e.key==="simecol"&&e.value?`${e.value} מ״ל`:"ניתן";
  if(e.category==="medicine")return[e.medType,e.dose].filter(Boolean).join(" · ");
  if(e.category==="feeding")return e.type==="breast"?(e.duration?`${e.duration} דקות`:""):(e.ml?`${e.ml} מ״ל`:"");
  return e.type==="wet"?"רטוב":e.type==="dirty"?"מלוכלך":e.type==="both"?"שניהם":"יבש";
}
function entryColor(e){
  if(e.category==="vitamin")return e.key==="simecol"?"#A8D8F9":e.key==="vitD"?"#FFE99A":"#FFCBA4";
  if(e.category==="medicine")return"#D4A8F9";
  if(e.category==="feeding")return e.type==="pump"?"#A8F0E8":"#F9A8C9";
  return"#9EDFCC";
}

// ── CLOUD ─────────────────────────────────────────────────────────────────────
async function loadData(){
  if(!window._load)return;
  const d=await window._load();
  DATA={entries:[],vitamins:{},medicalRecords:[],medicines:[],...d};
  renderAll();
  document.getElementById("loader").style.display="none";
}
async function saveData(){
  setSaveStatus("saving");
  const ok=await window._save(DATA);
  setSaveStatus(ok?"saved":"error");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>setSaveStatus("idle"),ok?2000:5000);
}
function setSaveStatus(s){
  const el=document.getElementById("save-status");
  if(s==="saving")el.textContent="💾 שומר...";
  else if(s==="saved")el.textContent="✅ נשמר";
  else if(s==="error")el.textContent="⚠️ שגיאת שמירה";
  else el.textContent="👨‍👩‍👧 יומן משפחתי";
}
async function syncNow(){
  document.getElementById("sync-btn").textContent="⏳";
  await loadData();
  document.getElementById("sync-btn").textContent="🔄";
  showToast("🔄 עודכן!");
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){
  renderHome();
  renderHistory();
  renderVitamins();
  renderMedical();
  updateAlert();
}

function renderHome(){
  const today=todayStr();
  const todayEntries=DATA.entries.filter(e=>e.time.slice(0,10)===today);
  const feedings=todayEntries.filter(e=>e.category==="feeding");
  const diapers=todayEntries.filter(e=>e.category==="diaper");
  const todayVits=DATA.vitamins[today]||{};
  const vitCount=[todayVits.vitD,todayVits.iron,todayVits.simecol].filter(Boolean).length;

  document.getElementById("stats-row").innerHTML=`
    <div class="stat-card" style="background:rgba(249,168,201,.2);border:2px solid #F9A8C9"><div class="emoji">🍼</div><div class="val">${feedings.length}</div><div class="lbl">האכלות</div></div>
    <div class="stat-card" style="background:rgba(158,223,204,.2);border:2px solid #9EDFCC"><div class="emoji">👶</div><div class="val">${diapers.length}</div><div class="lbl">חיתולים</div></div>
    <div class="stat-card" style="background:rgba(197,180,232,.2);border:2px solid #C5B4E8"><div class="emoji">💊</div><div class="val">${vitCount}/3</div><div class="lbl">ויטמינים</div></div>
    <div class="stat-card" style="background:rgba(168,216,249,.2);border:2px solid #A8D8F9"><div class="emoji">🔵</div><div class="val">${todayVits.simecol||"—"}</div><div class="lbl">סימיקול</div></div>
  `;

  const lastF=DATA.entries.filter(e=>e.category==="feeding").sort((a,b)=>new Date(b.time)-new Date(a.time))[0]||null;
  const lastD=DATA.entries.filter(e=>e.category==="diaper").sort((a,b)=>new Date(b.time)-new Date(a.time))[0]||null;
  document.getElementById("last-feeding-row").innerHTML=lastF?renderEntryRow(lastF,true,true):`<div class="entry-row" style="background:#f5f0ff;border-color:#f5f0ff;justify-content:center"><span style="color:#9B8AAD;font-size:13px">עוד לא נרשמה האכלה</span></div>`;
  document.getElementById("last-diaper-row").innerHTML=lastD?renderEntryRow(lastD,true,true):`<div class="entry-row" style="background:#f5f0ff;border-color:#f5f0ff;justify-content:center"><span style="color:#9B8AAD;font-size:13px">עוד לא נרשם חיתול</span></div>`;

  // Vit buttons
  document.getElementById("home-vit-row").innerHTML=`
    ${vitBtn("☀️","ויטמין D",todayVits.vitD,"#FFE99A","giveVit('vitD')")}
    ${vitBtn("🩸","ברזל",todayVits.iron,"#FFCBA4","giveVit('iron')")}
    ${vitBtnSim(todayVits.simecol)}
  `;

  // Meds quick
  const meds=DATA.medicines||[];
  if(meds.length>0){
    document.getElementById("meds-quick-section").style.display="";
    document.getElementById("meds-quick-list").innerHTML=meds.map(m=>`
      <button onclick="openWho({...${JSON.stringify(m)},_isMed:true,_med:${JSON.stringify(m)}})" style="background:rgba(212,168,249,.13);border:1.5px solid #D4A8F9;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;width:100%;margin-bottom:8px;text-align:right">
        <span style="font-size:24px">${m.medType==="משחה"?"🧴":m.medType==="טיפות"?"💧":"💊"}</span>
        <div style="flex:1"><div style="font-weight:800;color:#3D2B4F;font-size:14px">${m.name}</div>${m.dose?`<div style="font-size:12px;color:#9B8AAD">${m.dose}</div>`:""}</div>
        <span style="font-size:13px;color:#D4A8F9;font-weight:700">רשום ✓</span>
      </button>
    `).join("");
  } else {
    document.getElementById("meds-quick-section").style.display="none";
  }
}

function vitBtn(emoji,label,done,color,onclick){
  return`<button class="vit-btn${done?" done":""}" style="background:${done?color:color+"33"};border-color:${color};box-shadow:${done?`0 4px 14px ${color}88`:""}" onclick="${onclick}">
    <span class="v-emoji">${emoji}</span>
    <span class="v-label">${label}</span>
    <span class="v-status">${done?"✅ ניתן":"טרם"}</span>
  </button>`;
}
function vitBtnSim(val){
  return`<button class="vit-btn${val?" done":""}" style="background:${val?"#A8D8F9":"rgba(168,216,249,.2)"};border-color:#A8D8F9;box-shadow:${val?"0 4px 14px rgba(168,216,249,.5)":""}" onclick="toggleSimecol()">
    <span class="v-emoji">🔵</span>
    <span class="v-label">סימיקול</span>
    <span class="v-status">${val?`${val} מ״ל`:"טרם"}</span>
  </button>`;
}

function renderEntryRow(e,showAgo,clickable){
  const color=entryColor(e);
  const sub=entrySub(e);
  const by=e.by?`<div class="entry-by">👤 ${e.by}</div>`:"";
  const editMark=clickable?`<div class="edit">✏️</div>`:"";
  const onclick=clickable?`onclick="openEditModal('${e.id}')"`:""
  return`<div class="entry-row${clickable?" clickable":""}" style="background:${color}22;border-color:${color}" ${onclick}>
    <div class="entry-emoji">${entryEmoji(e)}</div>
    <div class="entry-info">
      <div class="entry-label">${entryLabel(e)}</div>
      ${sub?`<div class="entry-sub">${sub}</div>`:""}
      ${by}
    </div>
    <div class="entry-time">
      <div class="t">${fmtTime(e.time)}</div>
      ${showAgo?`<div class="ago">${timeAgo(e.time)}</div>`:""}
      ${editMark}
    </div>
  </div>`;
}

function renderHistory(){
  const filters=[
    {v:"all",l:"הכל"},{v:"feeding",l:"🍼 האכלות"},{v:"diaper",l:"👶 חיתולים"},
    {v:"vitamin",l:"💊 ויטמינים"},{v:"medicine",l:"🧴 תרופות"}
  ];
  document.getElementById("history-filters").innerHTML=filters.map(f=>`
    <button class="chip${histFilter===f.v?" active":""}" onclick="setHistFilter('${f.v}')">${f.l}</button>
  `).join("");

  let entries=histFilter==="all"?DATA.entries:DATA.entries.filter(e=>e.category===histFilter);
  const grouped={};
  entries.forEach(e=>{const d=e.time.slice(0,10);if(!grouped[d])grouped[d]=[];grouped[d].push(e);});
  const dates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  if(dates.length===0){document.getElementById("history-list").innerHTML=`<div class="empty">אין רשומות עדיין 🌱</div>`;return;}
  document.getElementById("history-list").innerHTML=dates.map(d=>`
    <div style="margin-bottom:18px">
      <div style="font-size:13px;font-weight:700;color:#9B8AAD;margin-bottom:8px">${fmtDate(d)}</div>
      ${grouped[d].sort((a,b)=>b.time.localeCompare(a.time)).map(e=>renderEntryRow(e,false,true)).join("")}
    </div>
  `).join("");
}

function renderVitamins(){
  const today=todayStr();
  const tv=DATA.vitamins[today]||{};
  const tve=DATA.entries.filter(e=>e.category==="vitamin"&&e.time.slice(0,10)===today);
  const sC=tve.filter(e=>e.key==="simecol").length;
  const vDC=tve.filter(e=>e.key==="vitD").length;
  const iC=tve.filter(e=>e.key==="iron").length;

  function vitBtnV(emoji,label,done,color,onclick,count){
    return`<button class="vit-btn${done?" done":""}" style="background:${done?color:color+"33"};border-color:${color};box-shadow:${done?`0 4px 14px ${color}88`:""};position:relative" onclick="${onclick}">
      ${count>1?`<span class="v-count">×${count}</span>`:""}
      <span class="v-emoji">${emoji}</span>
      <span class="v-label">${label}</span>
      <span class="v-status">${done?"✅ ניתן":"טרם"}</span>
    </button>`;
  }

  document.getElementById("vit-today-row").innerHTML=`
    ${vitBtnV("☀️","ויטמין D",!!tv.vitD,"#FFE99A","giveVit('vitD')",vDC)}
    ${vitBtnV("🩸","ברזל",!!tv.iron,"#FFCBA4","giveVit('iron')",iC)}
    <button class="vit-btn${tv.simecol?" done":""}" style="background:${tv.simecol?"#A8D8F9":"rgba(168,216,249,.2)"};border-color:#A8D8F9;position:relative" onclick="toggleSimecol()">
      ${sC>1?`<span class="v-count">×${sC}</span>`:""}
      <span class="v-emoji">🔵</span><span class="v-label">סימיקול</span>
      <span class="v-status">${tv.simecol?`${tv.simecol} מ״ל`:"טרם"}</span>
    </button>
  `;

  const sl=document.getElementById("simecol-count-label");
  if(sC>1){sl.style.display="";sl.textContent=`🔵 סימיקול ניתן ${sC} פעם היום`;}
  else sl.style.display="none";

  // History
  const dates=Object.keys(DATA.vitamins).sort((a,b)=>b.localeCompare(a)).slice(0,14);
  document.getElementById("vit-history").innerHTML=dates.length===0?`<div class="empty">אין נתונים עדיין</div>`:dates.map(d=>{
    const v=DATA.vitamins[d]||{};
    return`<div class="vit-history-row">
      <span style="font-size:13px;font-weight:700;color:#9B8AAD">${fmtDate(d)}</span>
      <div class="vit-icons">
        <div class="vi"><span style="opacity:${v.vitD?1:.18}">☀️</span></div>
        <div class="vi"><span style="opacity:${v.iron?1:.18}">🩸</span></div>
        <div class="vi"><span style="opacity:${v.simecol?1:.18}">🔵</span>${v.simecol?`<small>${v.simecol}מ״ל</small>`:""}</div>
      </div>
    </div>`;
  }).join("");
}

function renderMedical(){
  const future=(DATA.medicalRecords||[]).filter(r=>r.future).sort((a,b)=>a.date.localeCompare(b.date));
  const past=(DATA.medicalRecords||[]).filter(r=>!r.future).sort((a,b)=>b.date.localeCompare(a.date));

  function recCard(r){
    return`<div class="record-card" style="border:1.5px solid ${r.future?"#A8F0E8":"#C5B4E8"}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="rc-title">${r.title}</div>
          <div class="rc-sub">📅 ${fmtFullDate(r.date)}${r.recTime?" 🕐 "+r.recTime:""}</div>
          ${r.doctor?`<div class="rc-sub">👨‍⚕️ ${r.doctor}</div>`:""}
          ${r.location?`<div class="rc-sub">📍 ${r.location}</div>`:""}
        </div>
        <div class="record-actions">
          <button class="edit-sm" onclick="openSheet('record-form','${r.id}')">✏️</button>
          <button class="del-sm" onclick="deleteRecord('${r.id}')">🗑</button>
        </div>
      </div>
      ${r.notes?`<details style="margin-top:6px"><summary style="font-size:12px;color:#C5B4E8;font-weight:700;cursor:pointer">הצג הערות ▼</summary><div style="font-size:13px;color:#9B8AAD;margin-top:4px;line-height:1.5">${r.notes}</div></details>`:""}
      ${r.photoData?`<details style="margin-top:6px"><summary style="font-size:12px;color:#A8D8F9;font-weight:700;cursor:pointer">📎 הצג תמונה / מרשם</summary><div style="margin-top:8px">${r.photoData.startsWith("data:image")?`<img src="${r.photoData}" style="max-width:100%;border-radius:10px;max-height:200px;object-fit:cover"/>`:""}<a href="${r.photoData}" download="${r.photoName||'file'}" style="display:inline-block;margin-top:6px;font-size:12px;color:#A8D8F9;font-weight:700;text-decoration:none">⬇️ הורד ${r.photoName||"קובץ"}</a></div></details>`:""}
    </div>`;
  }

  document.getElementById("future-records").innerHTML=future.length?`<div style="font-size:13px;font-weight:700;color:#A8F0E8;margin-bottom:8px">🗓 בדיקות עתידיות</div>${future.map(recCard).join("")}`:"";
  document.getElementById("past-records").innerHTML=past.length===0?`<div class="empty">אין בדיקות עדיין 🩺</div>`:past.map(recCard).join("");

  const meds=DATA.medicines||[];
  document.getElementById("meds-list").innerHTML=meds.length===0?`<div class="empty">אין תרופות קבועות עדיין 💊</div>`:meds.map(m=>`
    <div style="background:#fff;border:1.5px solid #D4A8F9;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(61,43,79,.1)">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:28px">${m.medType==="משחה"?"🧴":m.medType==="טיפות"?"💧":"💊"}</span>
        <div style="flex:1">
          <div style="font-weight:900;color:#3D2B4F;font-size:15px">${m.name}</div>
          ${m.dose?`<div style="font-size:12px;color:#9B8AAD">${m.dose}</div>`:""}
          ${m.frequency?`<div style="font-size:12px;color:#9B8AAD">${m.frequency}</div>`:""}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="edit-sm" onclick="openSheet('med-form','${m.id}')">✏️</button>
          <button class="del-sm" onclick="deleteMed('${m.id}')">🗑</button>
        </div>
      </div>
    </div>
  `).join("");
}

function updateAlert(){
  const lastF=DATA.entries.filter(e=>e.category==="feeding").sort((a,b)=>new Date(b.time)-new Date(a.time))[0]||null;
  const banner=document.getElementById("alert-banner");
  const timer=document.getElementById("feeding-timer");

  if(!lastF){
    banner.className="";banner.style.display="none";
    timer.className="";timer.style.display="none";
    return;
  }

  const mins=Math.floor((Date.now()-new Date(lastF.time))/60000);
  const hours=mins/60;
  const totalMins=NEXT_FEEDING_HOURS*60;
  const pct=Math.min(100,Math.round((mins/totalMins)*100));

  // שעון חי
  const h=Math.floor(mins/60), m=mins%60;
  const timeStr=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  document.getElementById("timer-value").textContent=timeStr;
  document.getElementById("timer-bar").style.height=pct+"%";
  document.getElementById("timer-pct").textContent=pct+"%";
  document.getElementById("timer-bar").style.background=
    hours>=4?"linear-gradient(to top,#FF6B6B,#FFB347)":
    hours>=3?"linear-gradient(to top,#FFB347,#FFE99A)":
    "linear-gradient(to top,#F9A8C9,#C5B4E8)";

  const nextFeedingTime = new Date(new Date(lastF.time).getTime() + 3*60*60*1000);
  const nextStr = nextFeedingTime.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
  const minsLeft=totalMins-mins;
  document.getElementById("timer-next-time").textContent=nextStr;
  if(minsLeft>0){
    const hl=Math.floor(minsLeft/60),ml=minsLeft%60;
    document.getElementById("timer-next-sub").textContent=`עוד ${hl>0?hl+" ש' ":""}${ml} דק'`;
    timer.classList.remove("overdue");
  } else {
    document.getElementById("timer-next-sub").textContent="⚠️ עבר הזמן!";
    timer.classList.add("overdue");
  }
  timer.className="show";timer.style.display="";

  // באנר התראה
  if(hours<ALERT_HOURS){banner.className="";banner.style.display="none";return;}
  const hD=Math.floor(mins/60),mD=mins%60;
  const t=mD===0?`${hD} שעות`:`${hD} ש' ${mD} דק'`;
  document.getElementById("alert-title").textContent=hours>=5?"⚠️ דחוף! מילה רחל רעבה!":"🔔 זמן האכלה!";
  document.getElementById("alert-sub").textContent=`עברו ${t} מהאכלה האחרונה • ${fmtTime(lastF.time)}`;
  banner.className="show "+(hours>=5?"urgent":"warn");
  banner.style.display="";
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function addEntry(entry){
  DATA.entries.unshift({...entry,id:Date.now().toString(),time:nowIso()});
  saveData();renderAll();
}
function giveVit(key){
  const today=todayStr();
  if(!DATA.vitamins[today])DATA.vitamins[today]={};
  DATA.vitamins[today][key]=true;
  DATA.entries.unshift({id:Date.now().toString(),time:nowIso(),category:"vitamin",key,value:true,by:""});
  saveData();renderAll();showToast("✅ עודכן!");
}
function giveSimecol(v){
  if(!v||isNaN(v))return;
  const today=todayStr();
  if(!DATA.vitamins[today])DATA.vitamins[today]={};
  DATA.vitamins[today].simecol=v;
  DATA.entries.unshift({id:Date.now().toString(),time:nowIso(),category:"vitamin",key:"simecol",value:v,by:""});
  document.getElementById("simecol-custom").value="";
  document.getElementById("simecol-picker").style.display="none";
  showSim=false;
  saveData();renderAll();showToast("✅ סימיקול עודכן!");
}
function toggleSimecol(){
  showSim=!showSim;
  document.getElementById("simecol-picker").style.display=showSim?"":"none";
}

// ── WHO MODAL ─────────────────────────────────────────────────────────────────
function openWho(entry){
  pendingEntry=entry;
  openSheet("who");
}
function submitWho(name){
  if(!pendingEntry)return;
  closeSheet();
  if(pendingEntry._isVit){
    const key=pendingEntry.key,val=pendingEntry.value;
    const today=todayStr();
    if(!DATA.vitamins[today])DATA.vitamins[today]={};
    DATA.vitamins[today][key]=val;
    DATA.entries.unshift({id:Date.now().toString(),time:nowIso(),category:"vitamin",key,value:val,by:name});
    saveData();renderAll();showToast("✅ עודכן!");
  } else if(pendingEntry._isMed){
    const m=pendingEntry._med;
    DATA.entries.unshift({id:Date.now().toString(),time:nowIso(),category:"medicine",name:m.name,medType:m.medType,dose:m.dose,by:name});
    saveData();renderAll();showToast(`✅ ${m.name} נרשם!`);
  } else {
    addEntry({...pendingEntry,by:name});
    showToast("✅ נרשם!");
  }
  pendingEntry=null;
}
function submitWhoCustom(){
  const n=document.getElementById("custom-who-name").value.trim();
  if(!n)return;
  submitWho(n);
}

// Edit helpers
function setEditVitVal(v){
  document.querySelectorAll("[id^='sv-']").forEach(b=>b.style.background="rgba(168,216,249,.27)");
  document.getElementById("sv-"+v).style.background="#A8D8F9";
  currentEditEntry._editVitVal=v;
}
function setEditFeedType(t){
  ["breast","bottle","pump"].forEach(x=>{
    const btn=document.getElementById("et-"+x);
    if(btn)btn.style.background=x===t?({breast:"#F9A8C9",bottle:"#FFCBA4",pump:"#A8F0E8"}[x]):({breast:"rgba(249,168,201,.44)",bottle:"rgba(255,203,164,.44)",pump:"rgba(168,240,232,.44)"}[x]);
  });
  document.getElementById("edit-breast-section").style.display=t==="breast"?"":"none";
  document.getElementById("edit-ml-section").style.display=t!=="breast"?"":"none";
  if(t!=="breast"){
    document.getElementById("edit-ml-label").textContent=t==="pump"?"מ״ל שנשאב:":"מ״ל:";
    const mlBtns=document.getElementById("edit-ml-btns");
    const opts=t==="pump"?[30,40,50,60,70,80,90]:[60,70,80,90,100,120];
    const c=t==="pump"?"#A8F0E8":"#FFCBA4";
    mlBtns.innerHTML=opts.map(v=>`<button style="background:rgba(168,240,232,.3);border:2px solid ${c};border-radius:10px;padding:8px 14px;font-weight:800" onclick="setEditMl(${v})">${v}</button>`).join("");
  }
  currentEditEntry._editFeedType=t;
}
function setEditDuration(v){document.getElementById("edit-duration").value=v;}
function setEditMl(v){document.getElementById("edit-ml").value=v;}
function setEditDiaperType(t){
  ["wet","dirty","both","dry"].forEach(x=>{const b=document.getElementById("dt-"+x);if(b)b.style.background=x===t?"#9EDFCC":"rgba(158,223,204,.2)";});
  currentEditEntry._editDiaperType=t;
}
function setPerformer(n){
  ["chen","rachel"].forEach(x=>document.getElementById("pf-"+x)?.classList.remove("active"));
  if(n==="חן")document.getElementById("pf-chen")?.classList.add("active");
  else if(n==="רחל")document.getElementById("pf-rachel")?.classList.add("active");
  document.getElementById("edit-performer").value="";
}
function showDeleteConfirm(){document.getElementById("delete-confirm").style.display="";}
function confirmDelete(){
  if(!currentEditEntry)return;
  DATA.entries=DATA.entries.filter(e=>e.id!==currentEditEntry.id);
  currentEditEntry=null;closeSheet();saveData();renderAll();showToast("🗑 נמחק");
}
function saveEditEntry(){
  if(!currentEditEntry)return;
  const e=currentEditEntry;
  const tInp=document.getElementById("edit-time").value;
  const [h,m]=tInp.split(":").map(Number);
  const nd=new Date(e.time);nd.setHours(h,m,0,0);
  const performer=document.getElementById("edit-performer")?.value.trim()||e.by||"";
  const actualPerformer=["חן","רחל"].includes(e.by)&&!document.getElementById("edit-performer")?.value.trim()?e.by:performer;

  let updated={...e,time:nd.toISOString(),by:actualPerformer};
  if(e.category==="vitamin"){updated.value=e._editVitVal||e.value;}
  if(e.category==="feeding"){
    const ft=e._editFeedType||e.type;
    updated.type=ft;
    if(ft==="breast"){updated.duration=parseInt(document.getElementById("edit-duration")?.value)||e.duration;delete updated.ml;}
    else{updated.ml=parseInt(document.getElementById("edit-ml")?.value)||e.ml;delete updated.duration;}
  }
  if(e.category==="diaper"){updated.type=e._editDiaperType||e.type;}
  DATA.entries=DATA.entries.map(x=>x.id===e.id?updated:x);
  currentEditEntry=null;closeSheet();saveData();renderAll();showToast("✅ עודכן!");
}

}

function selectRecordType(future){
  document.getElementById("rf-future").value=future?"true":"false";
  document.getElementById("rb-past").style.background=future?"rgba(197,180,232,.1)":"#C5B4E8";
  document.getElementById("rb-future").style.background=future?"#A8F0E8":"rgba(168,240,232,.1)";
}
function previewPhoto(){
  const file=document.getElementById("rf-photo").files[0];
  if(!file)return;
  if(file.size>3*1024*1024){alert("הקובץ גדול מדי (מקסימום 3MB)");return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const isImg=file.type.startsWith("image/");
    document.getElementById("rf-photo-preview").innerHTML=isImg
      ?`<img src="${e.target.result}" style="max-width:100%;border-radius:10px;max-height:180px;object-fit:cover;margin-top:6px"/><div style="font-size:11px;color:#9B8AAD;margin-top:4px">📎 ${file.name}</div>`
      :`<div style="font-size:13px;color:#9B8AAD;margin-top:6px">📎 ${file.name}</div>`;
  };
  reader.readAsDataURL(file);
}
function closeSheet(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("sheet").innerHTML="";
  currentEditEntry=null;
}
function overlayClick(e){if(e.target===document.getElementById("overlay"))closeSheet();}

// Medical forms
function saveRecord(id){
  const title=document.getElementById("rf-title").value.trim();
  const date=document.getElementById("rf-date").value;
  if(!title||!date)return;
  const future=document.getElementById("rf-future").value==="true";
  const existingRec=id?DATA.medicalRecords.find(r=>r.id===id):null;
  const photoFile=document.getElementById("rf-photo")?.files[0];
  function doSave(photoData,photoName){
    const rec={
      id:id||Date.now().toString(),title,date,
      recTime:document.getElementById("rf-time")?.value||"",
      future,
      doctor:document.getElementById("rf-doctor").value,
      location:document.getElementById("rf-location").value,
      notes:document.getElementById("rf-notes").value,
      photoData:photoData||(existingRec?.photoData||null),
      photoName:photoName||(existingRec?.photoName||null)
    };
    if(id){DATA.medicalRecords=(DATA.medicalRecords||[]).map(r=>r.id===id?rec:r);}
    else{if(!DATA.medicalRecords)DATA.medicalRecords=[];DATA.medicalRecords.unshift(rec);}
    closeSheet();saveData();renderMedical();showToast("✅ נשמר!");
  }
  if(photoFile){
    const reader=new FileReader();
    reader.onload=e=>doSave(e.target.result,photoFile.name);
    reader.readAsDataURL(photoFile);
  } else {
    doSave(null,null);
  }
}
function deleteRecord(id){
  DATA.medicalRecords=(DATA.medicalRecords||[]).filter(r=>r.id!==id);
  saveData();renderMedical();showToast("🗑 נמחק");
}
function selectMedType(t){
  document.querySelectorAll(".med-type-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("mt-"+t)?.classList.add("active");
  document.getElementById("mf-type").value=t;
}
function selectFreq(f,btn){
  document.querySelectorAll(".freq-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("mf-freq").value=f;
}
function saveMed(id){
  const name=document.getElementById("mf-name").value.trim();
  if(!name)return;
  const med={id:id||Date.now().toString(),name,medType:document.getElementById("mf-type").value,dose:document.getElementById("mf-dose").value,frequency:document.getElementById("mf-freq").value,note:document.getElementById("mf-note").value};
  if(id){DATA.medicines=(DATA.medicines||[]).map(m=>m.id===id?med:m);}
  else{if(!DATA.medicines)DATA.medicines=[];DATA.medicines.unshift(med);}
  closeSheet();saveData();renderMedical();renderHome();showToast("✅ נשמר!");
}
function deleteMed(id){
  DATA.medicines=(DATA.medicines||[]).filter(m=>m.id!==id);
  saveData();renderMedical();renderHome();showToast("🗑 נמחק");
}

function switchMedTab(t){
  medTab=t;
  document.getElementById("medical-records-view").style.display=t==="records"?"":"none";
  document.getElementById("medical-meds-view").style.display=t==="meds"?"":"none";
  ["records","meds"].forEach(x=>{
    const btn=document.getElementById("med-tab-"+x);
    btn.classList.toggle("active",x===t);
    btn.style.background=x===t?(x==="records"?"#A8F0E8":"#D4A8F9"):(x==="records"?"rgba(168,240,232,.1)":"rgba(212,168,249,.07)");
  });
}

  currentTab=t;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+t).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));

}
function setHistFilter(f){histFilter=f;renderHistory();}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}
